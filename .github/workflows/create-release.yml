name: Create a release

env:
  DOTNET_VERSION: 7.x
  RELEASE_NAME_DIR: .RELEASE
  ACT: 'false'

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '!v0.0.0-act' # The tag "v0.0.0-act" is used for testing.
  workflow_dispatch:
    inputs:
      isDraft:
        type: boolean
        default: true
        description: 'Create a draft'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  main-job:
    runs-on: ubuntu-latest

    steps:
    - name: Init
      run: |
        echo "Runner: $(uname -a)"

    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Set environment variables
      run: |
        python ./ci/setup_env.py '${{ github.ref_name }}' "$GITHUB_REPOSITORY"

    - name: Run the game-specific script
      run: |
        script_path="./ci/game_specific.py"

    - name: Create release
      run: |
        python ./ci/create_release.py

    - name: Create an additional game-specific release (optional)
      run: |
        script_path="games/${GAME_NAME}/ci/create_release.py"

        if [ -f "$script_path" ]; then
          echo "Running game-specific release script for: ${GAME_NAME}"
          if ! python "$script_path"; then
            echo "Failed to execute script at $script_path" >&2
            exit 1
          fi
        else
          echo "No specific release script found at $script_path. Skipping."
        fi

    - name: Cleanup draft v0.0.0-act releases
      if: env.ACT == 'true' && startsWith(github.ref, 'refs/tags/') && github.ref_name == 'v0.0.0-act'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python ./ci/cleanup_draft_releases.py '${{ github.repository }}'

    - name: GH Release
      uses: softprops/action-gh-release@v3.0.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        files: |
          ${{ env.RELEASE_NAME_DIR }}/*
        draft: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.isDraft == 'true' }}
        body: ""
